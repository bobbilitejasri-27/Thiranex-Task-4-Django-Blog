<hr>
<h3>Comments</h3>
{% for comment in comments %}
    <p><b>{{ comment.author }}</b>: {{ comment.text }}</p>
{% empty %}
    <p>No comments yet.</p>
{% endfor %}

{% if user.is_authenticated %}
<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Add Comment</button>
</form>
{% else %}
    <p><a href="/admin">Login</a> to comment</p>
{% endif %}

<!DOCTYPE html>
<html>
<head>
    <title>Tejasri's Blog - Thiranex Task 4</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 40px auto; padding: 20px; }
        .post { border-bottom: 1px solid #ddd; padding: 20px 0; }
        .post h2 a { color: #333; text-decoration: none; }
        .date { color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <h1>Tejasri's Blog</h1>
    <p>Welcome to my Thiranex Task 4 Project</p>
    <hr>
    
    {% for post in posts %}
        <div class="post">
            <h2><a href="{% url 'post_detail' id=post.id %}">{{ post.title }}</a></h2>
            <p class="date">By {{ post.author }} on {{ post.created_at }}</p>
            <p>{{ post.content|truncatewords:30 }}</p>
        </div>
    {% empty %}
        <p>No posts yet.</p>
    {% endfor %}
</body>
</html>
